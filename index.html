<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Upgrade Your Home | Llama Bathroom</title>
    <link rel="stylesheet" href="/bathroom-assets/index.css" />
    <link
        rel="icon"
        href="/bathroom-assets/assets/favicon/favicon-32x32.png"
        sizes="32x32"
    />
    <link
        rel="icon"
        href="/bathroom-assets/assets/favicon/favicon-16x16.png"
        sizes="16x16"
    />
    <link
        rel="apple-touch-icon"
        href="/bathroom-assets/assets/favicon/apple-touch-icon.png"
    />
    <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "qmns45loop");
</script>
</head>
<body>


<div class="min-h-screen hero font-primary">
    <!-- NAVBAR START -->
    <div class="top-0 left-0 w-full h-fit navbar relative">
        <nav
            id="navbar"
            class="bg-transparent transition-all duration-500 ease-in-out py-2"
        >
            <div class="flex justify-center items-center px-5">
                <div class="flex items-center justify-center">
                    <a href="#" class="py-">
                        <img
                            src="/bathroom-assets/assets/bath-logo.svg"
                            alt="logo"
                            height="84"
                            width="135"
                            class="logo"
                        />
                    </a>
                </div>
            </div>
        </nav>
    </div>
    <!-- NAVBAR END -->

    <!-- HERO START -->
    <div
        id="inner-hero"
        class="left-0 right-0 bottom-0 z-20 w-full h-full px-2 flex flex-col items-center justify-center lg:justify-center main max-w-8xl mx-auto"
    >
        <div id="zipp" class="w-full px-8">
            <div class=""  style="max-width: 950px; margin: auto;">
                <h1
                    id="hero-text"
                    class="text-6xl leading-second sm:leading-main lg:leading-main text-white text-center"
                >
              <span class="font-head">
               Upgrade your home in Bengaluru with a new bathroom
              </span>
                </h1>
                <h4
                    id="hero-sub"
                    class="text-xl lg:text-3xl text-white mt-4 font-medium text-center"
                >
                    Enter your zip code to find what offers are available in your area.
                </h4>
            </div>
            <div
                id="hero-form"
                class="mx-auto relative rounded-xl flex flex-col p-8 lg:gap-y-8 secondary-font font-medium w-full lg:max-w-2xl max-w-lg"
            >
                <div
                    id="hero-box"
                    class="flex flex-col lg:flex-row items-center justify-center w-full space-x-2"
                >
                    <input
                        inputmode="numeric"
                        autocomplete="postal-code"
                        maxlength="5"
                        size="5"
                        id="zip_lead"
                        name="zip_lead"
                        type="text"
                        class="w-full text-md lg:text-lg border-2 border-gray-300 text-black text-center bg-white placeholder:text-center py-4 lg:py-2 rounded-full"
                        placeholder="Enter Zip Code"
                    />
                    <button
                        id="zip-lead-btn"
                        onclick="handleZipLead(event)"
                        class="w-full bg-brand-green text-md lg:text-lg cursor-pointer text-white py-3 lg:py-4 px-6 rounded-full border-2 border-transparent hover:border-brand-green hover:bg-white hover:shadow-md hover:text-brand-green transition-all duration-300 ease-in-out"
                    >
                        NEXT
                    </button>
                </div>
                <p
                    id="zip-error"
                    class="text-red-500 text-center text-sm px-4 py-2 hidden"
                ></p>
            </div>
        </div>
    </div>
    <!-- HERO END -->
</div>

<!-- FOOTER SECTION START  -->
<footer class="py-20 my-0 bottom-0 secondary-font bg-black w-full h-fit">
    <div class="bg-black lg:py-4 py-20 h-full font-light">
        <div
            class="flex flex-col lg:flex-row justify-center items-center lg:justify-between h-16 px-5 max-w-7xl mx-auto lg:space-y-0 space-y-6"
        >
            <div class="text-white text-center text-sm order-3 lg:order-1">
                © 2026 The Llama All rights reserved.
            </div>
            <div class="flex items-center justify-center order-1 lg:order-2">
                <a href="/">
                <img
                    src="/bathroom-assets/assets/bath-logo.svg"
                    alt="logo"
                    height="84"
                    width="135"
                    class="logo"
                    />
                </a>
            </div>
            <div
                class="flex flex-col lg:flex-row items-center justify-center space-y-2 lg:space-y-0 lg:pb-0 pb-10 text-white text-sm order-2 lg:order-3"
            >
                <a
                    href="/about"
                    class="text-center hover:text-gray-400 transition-all duration-300 ease-in-out"
                >
                    About
                </a>
                <!--
                <p class="text-center hidden lg:block mx-4">|</p>
                <a
                    href="https://thellama.com/blog"
                    target="_blank"
                    class="text-center hover:text-gray-400 transition-all duration-300 ease-in-out"
                >
                    News
                </a>
                -->
                <p class="text-center hidden lg:block mx-4">|</p>
                <a
                    href="/faq"
                    class="text-center hover:text-gray-400 transition-all duration-300 ease-in-out"
                >
                    FAQ
                </a>
                <p class="text-center hidden lg:block mx-4">|</p>
                <a
                    href="/contact"
                    class="text-center hover:text-gray-400 transition-all duration-300 ease-in-out"
                >
                    Contact Us
                </a>
                <p class="text-center hidden lg:block mx-4">|</p>
                <a
                    href="/privacy"
                    class="text-center hover:text-gray-400 transition-all duration-300 ease-in-out"
                >
                    Privacy Policy
                </a>
                <p class="text-center hidden lg:block mx-4">|</p>
                <a
                    href="/terms"
                    class="text-center hover:text-gray-400 transition-all duration-300 ease-in-out"
                >
                    Terms of Use
                </a>
                <p class="text-center hidden lg:block mx-4">|</p>
                <a
                    href="/ccpa"
                    class="text-center hover:text-gray-400 transition-all duration-300 ease-in-out"
                >
                    CCPA
                </a>
            </div>
        </div>
    </div>
</footer><!-- FOOTER SECTION END  -->

<style type="text/css">
    .hero {
        min-height: 100vh !important;
        display: flex !important;
        flex-direction: column !important;
        background-image: url("/bathroom-assets/assets/bath-hero.png") !important;
        background-size: cover !important;
        background-position: center bottom 50% !important;
    }
    #zip-lead-btn {
        background-color: #fb7304 !important;
    }
    #zip-lead-btn:hover {
        background-color: #1041b5 !important;
    }
    .navbar {
        min-height: 20px !important;
    }
    #inner-hero {
        position: relative !important;
        height: auto !important;
        top: 0 !important;
        width: 100% !important;
    }
    @media (min-width: 1024px) {

            margin-top: 2em;
        }
    }
    @media (max-width: 600px) {
        #inner-hero {
            padding-top: 0 !important;

        #hero-text {
